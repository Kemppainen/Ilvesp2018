<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ilves P2018 – Ottelukalenteri</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-hover: #1a1a1a;
      --border: #222;
      --border-lt: #2a2a2a;
      --green: #1db954;
      --green-dim: #168a3f;
      --green-glow: rgba(29,185,84,0.12);
      --yellow: #e5b800;
      --txt: #fff;
      --txt-dim: #8a8a8a;
      --txt-mute: #555;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg);color:var(--txt);min-height:100vh;min-height:100dvh;
      -webkit-font-smoothing:antialiased;overflow-x:hidden;
    }
    .c{max-width:860px;margin:0 auto;padding:16px 12px}

    /* ── Hero ── */
    .hero{
      position:relative;overflow:hidden;
      background:linear-gradient(160deg,#0d1f0d 0%,#0a0a0a 50%,#111 100%);
      border:1px solid var(--border);border-radius:18px;
      padding:28px 24px 24px;margin-bottom:20px;
    }
    .hero::before{
      content:'';position:absolute;top:-80px;right:-60px;
      width:250px;height:250px;border-radius:50%;
      background:radial-gradient(circle,rgba(29,185,84,0.08) 0%,transparent 70%);
    }
    .hero-top{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
    .hero-logo{
      width:56px;height:56px;border-radius:13px;flex-shrink:0;
      background:var(--green);display:flex;align-items:center;justify-content:center;
      font-size:28px;box-shadow:0 0 24px rgba(29,185,84,0.2);
    }
    .hero-title{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1.1}
    .hero-title span{color:var(--green)}
    .hero-sub{font-size:13px;color:var(--txt-dim);margin-top:3px;font-weight:500}
    .hero-stats{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;position:relative;z-index:1}
    .stat{
      background:rgba(255,255,255,0.04);border:1px solid var(--border);
      border-radius:11px;padding:8px 16px;text-align:center;flex:1;min-width:80px;
    }
    .stat-num{font-size:24px;font-weight:900;color:var(--green);line-height:1.1}
    .stat-label{font-size:9px;color:var(--txt-dim);letter-spacing:1.2px;font-weight:600;margin-top:2px}
    .stat-loc{
      display:flex;align-items:center;gap:5px;font-size:12px;color:var(--txt-dim);
      background:rgba(255,255,255,0.04);border:1px solid var(--border);
      border-radius:11px;padding:8px 14px;
    }

    /* ── Controls ── */
    .ctrls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .bg{
      display:flex;background:var(--bg-card);border:1px solid var(--border);
      border-radius:10px;overflow:hidden;flex:1;min-width:0;
    }
    .b{
      flex:1;padding:10px 6px;border:none;cursor:pointer;font-size:12px;
      font-weight:600;font-family:inherit;background:transparent;
      color:var(--txt-dim);transition:all .2s;white-space:nowrap;text-align:center;
      border-right:1px solid var(--border);
    }
    .b:last-child{border-right:none}
    .b:hover{color:var(--txt);background:rgba(255,255,255,0.04)}
    .b.on{background:var(--green);color:#000;font-weight:700}

    /* ── Loading ── */
    .ld{text-align:center;padding:60px 20px;color:var(--txt-dim)}
    .ld-i{font-size:38px;margin-bottom:14px;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.95)}}

    /* ── Match Cards ── */
    .mc{
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:14px;padding:16px 18px;margin-bottom:10px;
      position:relative;transition:all .2s;
    }
    .mc:hover{background:var(--bg-hover);border-color:var(--border-lt)}
    .mc:active{transform:scale(0.99)}
    .mc.h{border-left:4px solid var(--green)}
    .mc.a{border-left:4px solid var(--yellow)}
    .mc.p{opacity:.4}
    .mc.p:hover{opacity:.6}
    .mc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .mt{
      font-size:10px;font-weight:800;padding:3px 9px;border-radius:5px;
      letter-spacing:.8px;
    }
    .mt.h{background:var(--green);color:#000}
    .mt.a{background:var(--yellow);color:#000}
    .mc-cat{font-size:11px;color:var(--txt-mute);font-weight:500}
    .mc-teams{font-size:17px;font-weight:800;color:var(--txt);margin:3px 0;letter-spacing:-.3px;padding-right:80px}
    .mc-teams .iv{color:var(--green)}
    .mc-teams .vs{color:var(--txt-mute);font-weight:400;margin:0 5px;font-size:13px}
    .mc-sc{
      position:absolute;top:16px;right:16px;
      background:var(--green);color:#000;font-weight:900;font-size:16px;
      padding:5px 14px;border-radius:9px;letter-spacing:1.5px;
      box-shadow:0 0 16px rgba(29,185,84,0.2);
    }
    .mc-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--txt-dim)}
    .mc-meta span{display:flex;align-items:center;gap:4px}

    /* ── Table ── */
    .tw{
      background:var(--bg-card);border-radius:14px;border:1px solid var(--border);
      overflow-x:auto;-webkit-overflow-scrolling:touch;
    }
    .tw table{width:100%;border-collapse:collapse;min-width:600px}
    .tw th{
      background:#111;color:var(--green);padding:12px 14px;font-weight:700;
      font-size:10px;text-transform:uppercase;letter-spacing:1.2px;text-align:left;
      border-bottom:1px solid var(--border);position:sticky;top:0;
    }
    .tw td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--txt-dim)}
    .tw tr:last-child td{border-bottom:none}
    .tw tr:hover td{background:rgba(29,185,84,0.04)}
    .tw .bo{font-weight:700;color:var(--green)}
    .tw .sc{font-weight:800;color:var(--txt);text-align:center}

    /* ── Footer ── */
    .ft{
      text-align:center;padding:20px 0;margin-top:28px;
      border-top:1px solid var(--border);font-size:11px;color:var(--txt-mute);
    }
    .ft a{color:var(--green);text-decoration:none}
    .ft a:hover{text-decoration:underline}
    .ft-br{font-weight:700;letter-spacing:.5px;margin-bottom:4px;color:var(--txt-dim)}

    .hd{display:none!important}

    /* ── Responsive ── */
    @media(max-width:640px){
      .c{padding:12px 10px}
      .hero{padding:22px 18px 20px;border-radius:14px}
      .hero-logo{width:46px;height:46px;font-size:24px;border-radius:10px}
      .hero-title{font-size:22px}
      .hero-sub{font-size:12px}
      .hero-stats{gap:8px}
      .stat{padding:7px 12px}
      .stat-num{font-size:20px}
      .stat-label{font-size:8px}
      .stat-loc{font-size:11px;padding:7px 12px}
      .ctrls{gap:6px}
      .b{padding:9px 4px;font-size:11px}
      .mc{padding:14px 14px;border-radius:12px;margin-bottom:8px}
      .mc-teams{font-size:15px;padding-right:70px}
      .mc-sc{font-size:14px;padding:4px 11px;top:14px;right:12px}
      .mc-meta{gap:8px;font-size:11px;margin-top:6px}
      .mc-meta span{gap:3px}
      .ft{padding:16px 0;margin-top:20px;font-size:10px}
    }
    @media(max-width:380px){
      .hero-title{font-size:20px}
      .hero-logo{width:40px;height:40px;font-size:20px}
      .mc-teams{font-size:14px;padding-right:0}
      .mc-sc{position:static;display:inline-block;margin-top:8px}
      .b{font-size:10px;padding:8px 2px}
      .stat{min-width:60px;padding:6px 8px}
      .stat-num{font-size:18px}
    }

    /* ── Safe area (notch) ── */
    @supports(padding:max(0px)){
      .c{padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right))}
      .ft{padding-bottom:max(20px,env(safe-area-inset-bottom))}
    }

    /* ── Pull-to-refresh hint ── */
    .ptr{text-align:center;padding:10px;font-size:11px;color:var(--txt-mute);display:none}

    /* ── Touch feedback ── */
    @media(hover:none){
      .mc:active{background:var(--bg-hover);border-color:var(--border-lt);transform:scale(0.98)}
      .b:active{opacity:.7}
    }

    /* ── Landscape phone ── */
    @media(max-height:500px) and (orientation:landscape){
      .hero{padding:16px 18px;margin-bottom:14px}
      .hero-stats{margin-top:10px}
      .mc{padding:12px 14px;margin-bottom:6px}
    }
  </style>
</head>
<body>

<div class="c">
  <!-- Hero -->
  <div class="hero">
    <div class="hero-top">
      <div class="hero-logo">⚽</div>
      <div>
        <div class="hero-title">ILVES <span>P2018</span></div>
        <div class="hero-sub">Ottelukalenteri · Kausi 2025–2026</div>
      </div>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num" id="mc">-</div><div class="stat-label">OTTELUA</div></div>
      <div class="stat"><div class="stat-num" id="uc">-</div><div class="stat-label">TULOSSA</div></div>
      <div class="stat-loc">📍 Tampere</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="ctrls">
    <div class="bg">
      <button class="b on" data-v="cards" onclick="sv('cards',this)">🃏 Kortit</button>
      <button class="b" data-v="table" onclick="sv('table',this)">📋 Taulukko</button>
    </div>
    <div class="bg">
      <button class="b on" data-f="all" onclick="sf('all',this)">Kaikki</button>
      <button class="b" data-f="upcoming" onclick="sf('upcoming',this)">Tulevat</button>
      <button class="b" data-f="past" onclick="sf('past',this)">Menneet</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="ld" class="ld">
    <div class="ld-i">⚽</div>
    <div>Haetaan ottelutietoja...</div>
  </div>

  <div id="cv"></div>
  <div id="tv" class="hd"></div>
  <div id="wr" style="display:none"></div>

  <!-- Footer -->
  <div class="ft">
    <div class="ft-br">ILVES P2018</div>
    <a href="https://tulospalvelu.palloliitto.fi" target="_blank" rel="noopener">Tulospalvelu</a> · <a href="https://www.ilvesfootball.com" target="_blank" rel="noopener">ilvesfootball.com</a>
  </div>
</div>

<script>
var M=[],V='cards',F='all',D=['Su','Ma','Ti','Ke','To','Pe','La'],
DL=['Sunnuntai','Maanantai','Tiistai','Keskiviikko','Torstai','Perjantai','Lauantai'];

var wc=[];var ow=document.write.bind(document);
document.write=function(h){wc.push(h)};

var s=document.createElement('script');
s.src="https://spl.torneopal.fi/torneopal/ajax/[torneopal:team_schedule:team=35213605&key=Z4QDRKWRTR]";
s.onload=function(){setTimeout(pw,300)};
s.onerror=function(){setTimeout(pw,300)};
document.getElementById('wr').appendChild(s);
setTimeout(pw,6000);

var done=false;
function pw(){
  if(done)return;done=true;
  document.write=ow;
  var r=wc.join('');
  if(r)document.getElementById('wr').innerHTML=r;
  var t=document.querySelector('#wr table');
  if(t)M=pt(t);
  document.getElementById('ld').classList.add('hd');
  uc();rn();
}

function pt(t){
  var m=[];var rows=t.querySelectorAll('tr');
  for(var i=1;i<rows.length;i++){
    var c=rows[i].querySelectorAll('td');
    if(c.length<4)continue;
    var o={};
    if(c.length>=7){
      o={d:c[0].textContent.trim(),t:c[1].textContent.trim(),h:c[2].textContent.trim(),
        s:c[3].textContent.trim(),a:c[4].textContent.trim(),v:c[5].textContent.trim(),
        c:c[6].textContent.trim()};
    }else if(c.length>=5){
      o={d:c[0].textContent.trim(),t:c[1].textContent.trim(),h:c[2].textContent.trim(),
        s:c[3].textContent.trim(),a:c[4].textContent.trim(),
        v:c.length>5?c[5].textContent.trim():'',c:''};
    }else{
      o={d:c[0].textContent.trim(),t:'',h:c[1].textContent.trim(),
        s:c[2].textContent.trim(),a:c[3].textContent.trim(),v:'',c:''};
    }
    if(o.h||o.a)m.push(o);
  }
  return m;
}

function pd(s){
  if(!s)return null;var p=s.split('.');
  if(p.length<3)return null;
  return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
}

function uc(){
  var n=new Date();n.setHours(0,0,0,0);var u=0;
  for(var i=0;i<M.length;i++){var x=pd(M[i].d);if(x&&x>=n)u++}
  document.getElementById('mc').textContent=M.length;
  document.getElementById('uc').textContent=u;
}

function gf(){
  var n=new Date();n.setHours(0,0,0,0);var r=[];
  for(var i=0;i<M.length;i++){
    var m=M[i],x=pd(m.d);
    if(F==='upcoming'&&(!x||x<n))continue;
    if(F==='past'&&(!x||x>=n))continue;
    r.push(m);
  }
  return r;
}

function ii(n){return n&&n.toLowerCase().indexOf('ilves')!==-1}

function rn(){
  var l=gf();rc(l);rt(l);
  document.getElementById('cv').className=V==='cards'?'':'hd';
  document.getElementById('tv').className=V==='table'?'':'hd';
}

function rc(l){
  if(!l.length){document.getElementById('cv').innerHTML='<div style="text-align:center;padding:60px;color:#555">Ei otteluita valitulla suodattimella.</div>';return}
  var n=new Date();n.setHours(0,0,0,0);var html='';
  for(var i=0;i<l.length;i++){
    var m=l[i],hi=ii(m.h),ha=hi?'h':'a',hl=hi?'KOTI':'VIERAS',
    op=hi?m.a:m.h,dt=pd(m.d),ip=dt&&dt<n,dy=dt?DL[dt.getDay()]:'',
    hs=m.s&&m.s.trim()!==''&&m.s.trim()!=='-';
    html+='<div class="mc '+ha+(ip?' p':'')+'">';
    html+='<div class="mc-top"><span class="mt '+ha+'">'+hl+'</span>';
    if(m.c)html+='<span class="mc-cat">'+m.c+'</span>';
    html+='</div><div class="mc-teams">';
    if(hi)html+='<span class="iv">Ilves</span><span class="vs">vs</span>'+op;
    else html+=op+'<span class="vs">vs</span><span class="iv">Ilves</span>';
    html+='</div>';
    if(hs)html+='<div class="mc-sc">'+m.s+'</div>';
    html+='<div class="mc-meta">';
    if(m.d)html+='<span>📅 '+dy+' '+m.d+'</span>';
    if(m.t)html+='<span>⏰ '+m.t+'</span>';
    if(m.v)html+='<span>📍 '+m.v+'</span>';
    html+='</div></div>';
  }
  document.getElementById('cv').innerHTML=html;
}

function rt(l){
  if(!l.length){document.getElementById('tv').innerHTML='<div style="text-align:center;padding:60px;color:#555">Ei otteluita.</div>';return}
  var html='<div class="tw"><table><thead><tr>';
  var hd=['PVM','AIKA','KOTI','TULOS','VIERAS','KENTTÄ','SARJA'];
  for(var j=0;j<hd.length;j++)html+='<th>'+hd[j]+'</th>';
  html+='</tr></thead><tbody>';
  for(var i=0;i<l.length;i++){
    var m=l[i],hb=ii(m.h)?' class="bo"':'',ab=ii(m.a)?' class="bo"':'';
    html+='<tr><td>'+(m.d||'')+'</td><td>'+(m.t||'')+'</td>';
    html+='<td'+hb+'>'+(m.h||'')+'</td><td class="sc">'+(m.s||'-')+'</td>';
    html+='<td'+ab+'>'+(m.a||'')+'</td>';
    html+='<td style="font-size:12px">'+(m.v||'')+'</td>';
    html+='<td style="color:#555;font-size:12px">'+(m.c||'')+'</td></tr>';
  }
  html+='</tbody></table></div>';
  document.getElementById('tv').innerHTML=html;
}

function sv(v,e){
  V=v;var b=document.querySelectorAll('[data-v]');
  for(var i=0;i<b.length;i++)b[i].classList.remove('on');
  e.classList.add('on');rn();
}
function sf(f,e){
  F=f;var b=document.querySelectorAll('[data-f]');
  for(var i=0;i<b.length;i++)b[i].classList.remove('on');
  e.classList.add('on');rn();
}
</script>
</body>
</html>
