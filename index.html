<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ilves P2018 – Ottelukalenteri</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-card: #141414;
      --bg-card-hover: #1a1a1a;
      --border: #222;
      --border-light: #2a2a2a;
      --green: #1db954;
      --green-dim: #168a3f;
      --green-glow: rgba(29,185,84,0.15);
      --yellow: #e5b800;
      --yellow-dim: rgba(229,184,0,0.15);
      --text: #ffffff;
      --text-dim: #8a8a8a;
      --text-muted: #555;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark); color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }

    /* ── Hero ── */
    .hero {
      position: relative; overflow: hidden;
      background: linear-gradient(160deg, #0d1f0d 0%, #0a0a0a 50%, #111 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 40px 32px;
      margin-bottom: 28px;
    }
    .hero::before {
      content: ''; position: absolute; top: -80px; right: -60px;
      width: 280px; height: 280px; border-radius: 50%;
      background: radial-gradient(circle, rgba(29,185,84,0.08) 0%, transparent 70%);
    }
    .hero::after {
      content: ''; position: absolute; bottom: -40px; left: 30%;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(29,185,84,0.04) 0%, transparent 70%);
    }
    .hero-top { display: flex; align-items: center; gap: 18px; position: relative; z-index: 1; }
    .hero-logo {
      width: 64px; height: 64px; border-radius: 14px;
      background: var(--green); display: flex; align-items: center; justify-content: center;
      font-size: 32px; box-shadow: 0 0 30px rgba(29,185,84,0.2);
    }
    .hero-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; line-height: 1.1; }
    .hero-title span { color: var(--green); }
    .hero-sub { font-size: 14px; color: var(--text-dim); margin-top: 4px; font-weight: 500; }
    .hero-stats {
      display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; position: relative; z-index: 1;
    }
    .stat {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 20px; text-align: center;
      backdrop-filter: blur(8px);
    }
    .stat-num { font-size: 26px; font-weight: 900; color: var(--green); line-height: 1.1; }
    .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1.2px; font-weight: 600; margin-top: 2px; }
    .stat-loc {
      display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-dim);
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 18px;
    }

    /* ── Controls ── */
    .controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .btn-group {
      display: flex; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .btn {
      padding: 10px 20px; border: none; cursor: pointer; font-size: 13px;
      font-weight: 600; font-family: inherit; background: transparent;
      color: var(--text-dim); transition: all 0.2s; border-right: 1px solid var(--border);
    }
    .btn:last-child { border-right: none; }
    .btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .btn.active { background: var(--green); color: #000; font-weight: 700; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 80px 20px; color: var(--text-dim); }
    .loading-icon { font-size: 42px; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.95)} }

    /* ── Match Cards ── */
    .match-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 22px; margin-bottom: 10px;
      position: relative; transition: all 0.25s; cursor: default;
    }
    .match-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); transform: translateY(-1px); }
    .match-card.home { border-left: 4px solid var(--green); }
    .match-card.away { border-left: 4px solid var(--yellow); }
    .match-card.past { opacity: 0.45; }
    .match-card.past:hover { opacity: 0.65; }
    .match-row-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .match-tag {
      font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 5px;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .match-tag.home { background: var(--green); color: #000; }
    .match-tag.away { background: var(--yellow); color: #000; }
    .match-cat { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .match-teams { font-size: 18px; font-weight: 800; color: var(--text); margin: 4px 0; letter-spacing: -0.3px; }
    .match-teams .ilves { color: var(--green); }
    .match-teams .vs { color: var(--text-muted); font-weight: 400; margin: 0 6px; font-size: 14px; }
    .match-score {
      position: absolute; top: 18px; right: 22px;
      background: var(--green); color: #000; font-weight: 900; font-size: 18px;
      padding: 6px 18px; border-radius: 10px; letter-spacing: 1.5px;
      box-shadow: 0 0 20px rgba(29,185,84,0.2);
    }
    .match-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 8px; font-size: 12px; color: var(--text-dim); }
    .match-meta span { display: flex; align-items: center; gap: 5px; }

    /* ── Table ── */
    .table-wrap {
      background: var(--bg-card); border-radius: 14px; border: 1px solid var(--border);
      overflow: hidden;
    }
    .table-wrap table { width: 100%; border-collapse: collapse; }
    .table-wrap th {
      background: #111; color: var(--green); padding: 14px 18px; font-weight: 700;
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .table-wrap td {
      padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-dim);
    }
    .table-wrap tr:last-child td { border-bottom: none; }
    .table-wrap tr:hover td { background: rgba(29,185,84,0.04); }
    .table-wrap .bold { font-weight: 700; color: var(--green); }
    .table-wrap .score-cell { font-weight: 800; color: var(--text); text-align: center; }

    /* ── Footer ── */
    .footer {
      text-align: center; padding: 24px 0; margin-top: 32px;
      border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted);
    }
    .footer a { color: var(--green); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .footer-brand { font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; color: var(--text-dim); }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .hero { padding: 24px 20px 22px; }
      .hero-title { font-size: 22px; }
      .hero-logo { width: 50px; height: 50px; font-size: 26px; }
      .match-teams { font-size: 15px; }
      .match-score { font-size: 14px; padding: 4px 12px; top: 16px; right: 16px; }
      .match-card { padding: 14px 16px; }
      .table-wrap { overflow-x: auto; }
      .stat-num { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Hero -->
  <div class="hero">
    <div class="hero-top">
      <div class="hero-logo">⚽</div>
      <div>
        <div class="hero-title">ILVES <span>P2018</span></div>
        <div class="hero-sub">Ottelukalenteri · Kausi 2025–2026</div>
      </div>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num" id="matchCount">-</div><div class="stat-label">OTTELUA</div></div>
      <div class="stat"><div class="stat-num" id="upcomingCount">-</div><div class="stat-label">TULOSSA</div></div>
      <div class="stat-loc">📍 Tampere</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="btn-group">
      <button class="btn active" data-view="cards" onclick="switchView('cards',this)">🃏 Kortit</button>
      <button class="btn" data-view="table" onclick="switchView('table',this)">📋 Taulukko</button>
    </div>
    <div class="btn-group">
      <button class="btn active" data-filter="all" onclick="applyFilter('all',this)">Kaikki</button>
      <button class="btn" data-filter="upcoming" onclick="applyFilter('upcoming',this)">Tulevat</button>
      <button class="btn" data-filter="past" onclick="applyFilter('past',this)">Menneet</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="loading">
    <div class="loading-icon">⚽</div>
    <div>Haetaan ottelutietoja Palloliiton tulospalvelusta...</div>
  </div>

  <div id="cardsView"></div>
  <div id="tableView" class="hidden"></div>
  <div id="widgetRaw" style="display:none"></div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-brand">ILVES P2018</div>
    Tiedot: <a href="https://tulospalvelu.palloliitto.fi" target="_blank" rel="noopener">Suomen Palloliitto / Tulospalvelu</a> · <a href="https://www.ilvesfootball.com" target="_blank" rel="noopener">ilvesfootball.com</a>
  </div>
</div>

<script>
var allMatches = [];
var currentView = 'cards';
var currentFilter = 'all';
var DAYS = ['Sunnuntai','Maanantai','Tiistai','Keskiviikko','Torstai','Perjantai','Lauantai'];

var widgetChunks = [];
var originalWrite = document.write.bind(document);
document.write = function(html) { widgetChunks.push(html); };

var s = document.createElement('script');
s.src = "https://spl.torneopal.fi/torneopal/ajax/[torneopal:team_schedule:team=35213605&key=Z4QDRKWRTR]";
s.onload = function() { setTimeout(processWidget, 300); };
s.onerror = function() { setTimeout(processWidget, 300); };
document.getElementById('widgetRaw').appendChild(s);
setTimeout(processWidget, 6000);

var processed = false;
function processWidget() {
  if (processed) return;
  processed = true;
  document.write = originalWrite;
  var raw = widgetChunks.join('');
  if (raw) { document.getElementById('widgetRaw').innerHTML = raw; }
  var table = document.querySelector('#widgetRaw table');
  if (table) { allMatches = parseTable(table); }
  document.getElementById('loading').classList.add('hidden');
  updateCounts();
  render();
}

function parseTable(table) {
  var matches = [];
  var rows = table.querySelectorAll('tr');
  for (var i = 1; i < rows.length; i++) {
    var cells = rows[i].querySelectorAll('td');
    if (cells.length < 4) continue;
    var m = {};
    if (cells.length >= 7) {
      m = { date: cells[0].textContent.trim(), time: cells[1].textContent.trim(),
        home: cells[2].textContent.trim(), score: cells[3].textContent.trim(),
        away: cells[4].textContent.trim(), venue: cells[5].textContent.trim(),
        cat: cells[6].textContent.trim() };
    } else if (cells.length >= 5) {
      m = { date: cells[0].textContent.trim(), time: cells[1].textContent.trim(),
        home: cells[2].textContent.trim(), score: cells[3].textContent.trim(),
        away: cells[4].textContent.trim(), venue: cells.length > 5 ? cells[5].textContent.trim() : '', cat: '' };
    } else {
      m = { date: cells[0].textContent.trim(), time: '',
        home: cells[1].textContent.trim(), score: cells[2].textContent.trim(),
        away: cells[3].textContent.trim(), venue: '', cat: '' };
    }
    if (m.home || m.away) matches.push(m);
  }
  return matches;
}

function parseDateFI(s) {
  if (!s) return null;
  var p = s.split('.');
  if (p.length < 3) return null;
  return new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
}

function updateCounts() {
  var now = new Date(); now.setHours(0,0,0,0);
  var up = 0;
  for (var i = 0; i < allMatches.length; i++) {
    var d = parseDateFI(allMatches[i].date);
    if (d && d >= now) up++;
  }
  document.getElementById('matchCount').textContent = allMatches.length;
  document.getElementById('upcomingCount').textContent = up;
}

function getFiltered() {
  var now = new Date(); now.setHours(0,0,0,0);
  var result = [];
  for (var i = 0; i < allMatches.length; i++) {
    var m = allMatches[i];
    var d = parseDateFI(m.date);
    if (currentFilter === 'upcoming' && (!d || d < now)) continue;
    if (currentFilter === 'past' && (!d || d >= now)) continue;
    result.push(m);
  }
  return result;
}

function isIlves(name) { return name && name.toLowerCase().indexOf('ilves') !== -1; }

function render() {
  var list = getFiltered();
  renderCards(list);
  renderTable(list);
  document.getElementById('cardsView').className = currentView === 'cards' ? '' : 'hidden';
  document.getElementById('tableView').className = currentView === 'table' ? '' : 'hidden';
}

function renderCards(list) {
  if (!list.length) {
    document.getElementById('cardsView').innerHTML = '<div style="text-align:center;padding:60px;color:#555">Ei otteluita valitulla suodattimella.</div>';
    return;
  }
  var now = new Date(); now.setHours(0,0,0,0);
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var m = list[i];
    var homeIsIlves = isIlves(m.home);
    var ha = homeIsIlves ? 'home' : 'away';
    var haLabel = homeIsIlves ? 'KOTI' : 'VIERAS';
    var opp = homeIsIlves ? m.away : m.home;
    var dt = parseDateFI(m.date);
    var isPast = dt && dt < now;
    var day = dt ? DAYS[dt.getDay()] : '';
    var hasScore = m.score && m.score.trim() !== '' && m.score.trim() !== '-';
    html += '<div class="match-card ' + ha + (isPast ? ' past' : '') + '">';
    html += '<div class="match-row-top"><span class="match-tag ' + ha + '">' + haLabel + '</span>';
    if (m.cat) html += '<span class="match-cat">' + m.cat + '</span>';
    html += '</div>';
    html += '<div class="match-teams">';
    if (homeIsIlves) {
      html += '<span class="ilves">Ilves</span><span class="vs">vs</span>' + opp;
    } else {
      html += opp + '<span class="vs">vs</span><span class="ilves">Ilves</span>';
    }
    html += '</div>';
    if (hasScore) html += '<div class="match-score">' + m.score + '</div>';
    html += '<div class="match-meta">';
    if (m.date) html += '<span>📅 ' + day + ' ' + m.date + '</span>';
    if (m.time) html += '<span>⏰ ' + m.time + '</span>';
    if (m.venue) html += '<span>📍 ' + m.venue + '</span>';
    html += '</div></div>';
  }
  document.getElementById('cardsView').innerHTML = html;
}

function renderTable(list) {
  if (!list.length) {
    document.getElementById('tableView').innerHTML = '<div style="text-align:center;padding:60px;color:#555">Ei otteluita.</div>';
    return;
  }
  var html = '<div class="table-wrap"><table><thead><tr>';
  var headers = ['PVM','AIKA','KOTI','TULOS','VIERAS','KENTTÄ','SARJA'];
  for (var h = 0; h < headers.length; h++) html += '<th>' + headers[h] + '</th>';
  html += '</tr></thead><tbody>';
  for (var i = 0; i < list.length; i++) {
    var m = list[i];
    var hb = isIlves(m.home) ? ' class="bold"' : '';
    var ab = isIlves(m.away) ? ' class="bold"' : '';
    html += '<tr>';
    html += '<td>' + (m.date || '') + '</td>';
    html += '<td>' + (m.time || '') + '</td>';
    html += '<td' + hb + '>' + (m.home || '') + '</td>';
    html += '<td class="score-cell">' + (m.score || '-') + '</td>';
    html += '<td' + ab + '>' + (m.away || '') + '</td>';
    html += '<td style="font-size:12px">' + (m.venue || '') + '</td>';
    html += '<td style="color:#555;font-size:12px">' + (m.cat || '') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  document.getElementById('tableView').innerHTML = html;
}

function switchView(view, el) {
  currentView = view;
  var btns = document.querySelectorAll('[data-view]');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  el.classList.add('active');
  render();
}

function applyFilter(f, el) {
  currentFilter = f;
  var btns = document.querySelectorAll('[data-filter]');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  el.classList.add('active');
  render();
}
</script>
</body>
</html>
